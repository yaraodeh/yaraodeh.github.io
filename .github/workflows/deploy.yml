name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_GH_OWNER: ${{ secrets.VITE_GH_OWNER }}
          VITE_GH_REPO: ${{ secrets.VITE_GH_REPO }}
          VITE_GH_BRANCH: ${{ secrets.VITE_GH_BRANCH }}

      - name: Deploy to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf assets/
          cp dist/index.html ./index.html
          cp -r dist/assets ./assets
          cp dist/.nojekyll ./.nojekyll
          git add --force index.html assets/ .nojekyll
          git diff --cached --quiet && echo "Nothing to deploy" || git commit -m "ci: deploy [skip ci]"
          git push origin main
