<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Yara Odeh</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'><path fill='white' d='M9 3L7.17 5H4C2.9 5 2 5.9 2 7V19C2 20.1 2.9 21 4 21H20C21.1 21 22 20.1 22 19V7C22 5.9 21.1 5 20 5H16.83L15 3H9ZM12 18C9.24 18 7 15.76 7 13C7 10.24 9.24 8 12 8C14.76 8 17 10.24 17 13C17 15.76 14.76 18 12 18ZM12 10C10.34 10 9 11.34 9 13C9 14.66 10.34 16 12 16C13.66 16 15 14.66 15 13C15 11.34 13.66 10 12 10Z'/></svg>">
    <link rel="stylesheet" href="templatemo-amber-folio.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            background: #000;
        }

        /* ── Fullscreen carousel ── */
        .carousel {
            position: fixed;
            inset: 0;
            background: #000;
        }

        .carousel-track {
            display: flex;
            height: 100%;
            transition: transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .carousel-slide {
            flex: 0 0 100%;
            height: 100%;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* ── Bottom gradient + title ── */
        .carousel-overlay {
            position: fixed;
            inset: auto 0 0 0;
            height: 65%;
            background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.4) 55%, transparent 100%);
            pointer-events: none;
            z-index: 5;
        }

        .carousel-title {
            position: fixed;
            bottom: 40px;
            left: 40px;
            right: 160px;
            z-index: 10;
            pointer-events: none;
            max-height: 50vh;
            overflow: hidden;
        }

        .carousel-title h1 {
            font-size: clamp(1.6rem, 4vw, 3.5rem);
            font-weight: 900;
            letter-spacing: -1.5px;
            color: #fff;
            line-height: 1;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
            margin: 0 0 12px;
        }

        .carousel-title p {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(13px, 1.4vw, 16px);
            line-height: 1.7;
            margin: 0 0 8px;
            text-shadow: 0 1px 8px rgba(0,0,0,0.6);
        }

        /* ── Back button ── */
        .back-btn {
            position: fixed;
            top: 90px;
            left: 28px;
            z-index: 100;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 100px;
            padding: 10px 18px 10px 12px;
            transition: background 0.2s, border-color 0.2s;
        }

        .back-btn:hover {
            background: rgba(0, 0, 0, 0.78);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .back-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            flex-shrink: 0;
        }

        /* ── Prev / Next arrows ── */
        .carousel-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .carousel-btn:hover {
            background: rgba(0, 0, 0, 0.7);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .carousel-btn.prev { left: 20px; }
        .carousel-btn.next { right: 20px; }

        .carousel-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* ── Dots ── */
        .carousel-dots {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .carousel-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            border: none;
            cursor: pointer;
            padding: 0;
            transition: background 0.25s, transform 0.25s;
        }

        .carousel-dot.active {
            background: #fff;
            transform: scale(1.4);
        }

        /* ── Counter ── */
        .carousel-counter {
            position: fixed;
            bottom: 26px;
            right: 28px;
            z-index: 20;
            color: rgba(255, 255, 255, 0.55);
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* ── Hide nav when single image ── */
        .carousel.single ~ .carousel-btn,
        body.single .carousel-btn,
        body.single .carousel-dots,
        body.single .carousel-counter { display: none; }

        @media (max-width: 600px) {
            .carousel-title { left: 20px; bottom: 40px; right: 80px; }
            .carousel-btn.prev { left: 8px; }
            .carousel-btn.next { right: 8px; }
            .back-btn { top: 80px; left: 16px; }
        }
    </style>
</head>
<body>

    <header id="header">
        <nav>
            <a href="index.html#home" class="logo">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9 3L7.17 5H4C2.9 5 2 5.9 2 7V19C2 20.1 2.9 21 4 21H20C21.1 21 22 20.1 22 19V7C22 5.9 21.1 5 20 5H16.83L15 3H9ZM12 18C9.24 18 7 15.76 7 13C7 10.24 9.24 8 12 8C14.76 8 17 10.24 17 13C17 15.76 14.76 18 12 18ZM12 10C10.34 10 9 11.34 9 13C9 14.66 10.34 16 12 16C13.66 16 15 14.66 15 13C15 11.34 13.66 10 12 10Z"/>
                </svg>
                Yara Odeh
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#portfolio">Portfolio</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#services">Services</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <div class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <!-- Fullscreen carousel -->
    <div class="carousel" id="carousel">
        <div class="carousel-track" id="carouselTrack"></div>
    </div>

    <!-- Bottom gradient overlay -->
    <div class="carousel-overlay"></div>

    <!-- Project title + body -->
    <div class="carousel-title" id="carouselTitle" style="display:none">
        <h1 id="projectTitle"></h1>
        <div id="projectBody"></div>
    </div>

    <!-- Back button -->
    <a href="index.html#portfolio" class="back-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
        Portfolio
    </a>

    <!-- Prev / Next -->
    <button class="carousel-btn prev" id="prevBtn" aria-label="Previous image">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <button class="carousel-btn next" id="nextBtn" aria-label="Next image">
        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
    </button>

    <!-- Dots + counter -->
    <div class="carousel-dots" id="carouselDots"></div>
    <div class="carousel-counter" id="carouselCounter"></div>


    <script>
        let current = 0;
        let total = 0;

        function goTo(index) {
            current = (index + total) % total;
            document.getElementById('carouselTrack').style.transform = `translateX(-${current * 100}%)`;
            document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === current));
            document.getElementById('carouselCounter').textContent = `${current + 1} / ${total}`;
        }

        async function loadProject() {
            const params = new URLSearchParams(window.location.search);
            const project = params.get('project');
            if (!project) { window.location.href = 'index.html#portfolio'; return; }

            const [titleRes, bodyRes] = await Promise.all([
                fetch(`portfolio/${project}/title.txt`),
                fetch(`portfolio/${project}/body.txt`)
            ]);
            if (!titleRes.ok) { window.location.href = 'index.html#portfolio'; return; }

            const [title, body] = await Promise.all([titleRes.text(), bodyRes.text()]);
            const trimmedTitle = title.trim();

            document.title = `${trimmedTitle} | Yara Odeh`;

            const bodyHTML = body.trim()
                .split(/\n\n+/)
                .map(p => `<p>${p.trim()}</p>`)
                .join('');

            document.getElementById('projectTitle').textContent = trimmedTitle;
            document.getElementById('projectBody').innerHTML = bodyHTML;
            document.getElementById('carouselTitle').style.display = '';

            const images = ['1-image.jpg'];

            total = images.length;
            const track = document.getElementById('carouselTrack');
            const dotsContainer = document.getElementById('carouselDots');

            images.forEach((filename, i) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                const img = document.createElement('img');
                img.src = `portfolio/${project}/${filename}`;
                img.alt = i === 0 ? trimmedTitle : `${trimmedTitle} — ${i + 1}`;
                img.loading = i === 0 ? 'eager' : 'lazy';
                slide.appendChild(img);
                track.appendChild(slide);

                const dot = document.createElement('button');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.setAttribute('aria-label', `Image ${i + 1}`);
                dot.addEventListener('click', () => goTo(i));
                dotsContainer.appendChild(dot);
            });

            if (total <= 1) {
                document.getElementById('prevBtn').style.display = 'none';
                document.getElementById('nextBtn').style.display = 'none';
                dotsContainer.style.display = 'none';
                document.getElementById('carouselCounter').style.display = 'none';
            }

            goTo(0);

            document.getElementById('prevBtn').addEventListener('click', () => goTo(current - 1));
            document.getElementById('nextBtn').addEventListener('click', () => goTo(current + 1));

            document.addEventListener('keydown', e => {
                if (e.key === 'ArrowLeft')  goTo(current - 1);
                if (e.key === 'ArrowRight') goTo(current + 1);
            });

            // Swipe
            let startX = 0;
            const carouselEl = document.getElementById('carousel');
            carouselEl.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
            carouselEl.addEventListener('touchend', e => {
                const diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 40) goTo(current + (diff > 0 ? 1 : -1));
            }, { passive: true });
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadProject();

            const header = document.getElementById('header');
            window.addEventListener('scroll', () => {
                header.classList.toggle('scrolled', window.scrollY > 50);
            });

            const menuToggle = document.getElementById('menuToggle');
            const navMenu = document.getElementById('navMenu');
            menuToggle.addEventListener('click', () => {
                menuToggle.classList.toggle('active');
                navMenu.classList.toggle('active');
            });
            document.querySelectorAll('.nav-menu a').forEach(link => {
                link.addEventListener('click', () => {
                    menuToggle.classList.remove('active');
                    navMenu.classList.remove('active');
                });
            });
        });
    </script>
</body>
</html>
